<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural City & Village Auto-Generator</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #111; color: #eee;
        }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top:0; left:0; z-index:1; }
        
        #control-sidebar {
            position: absolute; top: 15px; left: 15px; z-index: 10;
            background: rgba(20, 20, 20, 0.95); padding: 15px; border-radius: 12px;
            width: 290px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 1px solid #333; backdrop-filter: blur(8px);
        }
        h3 { margin: 0 0 12px 0; color: #4af; font-size: 15px; text-transform: uppercase; letter-spacing: 0.5px; }
        .section { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 12px; }
        .section:last-child { border: none; margin: 0; padding: 0; }
        label { display: block; font-size: 11px; color: #aaa; margin-bottom: 5px; font-weight: bold; }
        
        input[type="file"] {
            display: block; width: 100%; background: #222; color: #fff;
            padding: 8px; border: 1px solid #444; border-radius: 6px; font-size: 11px; box-sizing: border-box;
        }
        select {
            width: 100%; background: #222; color: #fff; padding: 8px;
            border: 1px solid #444; border-radius: 6px; font-size: 12px; outline: none;
        }
        
        .gen-btn {
            width: 100%; background: #4af; color: #000; border: none;
            padding: 12px; border-radius: 8px; font-weight: bold; font-size: 13px;
            cursor: pointer; transition: background 0.2s; text-transform: uppercase;
        }
        .gen-btn:hover { background: #39e; }
        
        .stats { font-size: 11px; color: #666; margin-top: 4px; }
        #loading-overlay {
            position: absolute; top: 15px; right: 15px; z-index: 10;
            background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 20px;
            font-size: 11px; font-weight: bold; color: #ffb703;
            border: 1px solid #444; display: none;
        }
    </style>
    <!-- Dependencies -->
    <script src="unpkg.com"></script>
    <script src="unpkg.com"></script>
    <script src="unpkg.com"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="loading-overlay">GENERATING GRID LAYOUT...</div>

    <div id="control-sidebar">
        <div class="section">
            <h3>1. Feed Assets</h3>
            <label>Upload 3D Models (.glb format):</label>
            <input type="file" id="glb-uploader" accept=".glb" multiple>
            <div class="stats" id="asset-count">0 custom meshes loaded. Using system structural primitives.</div>
        </div>

        <div class="section">
            <h3>2. Layout Parameters</h3>
            <label>Zoning Archetype Profile:</label>
            <select id="biome-selector">
                <option value="CITY">Metropolis (High Density Grid, Uniform Heights)</option>
                <option value="VILLAGE">Rural Village (Organic Scattered Clusters, Varied Scales)</option>
                <option value="OUTPOST">Industrial Outpost (Sparse, Rigid Linear Rows)</option>
            </select>
        </div>

        <button class="gen-btn" id="generate-trigger">Auto-Generate Settlement</button>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let assetTemplates = []; // Built meshes ready for duplication loops
        const container = document.getElementById('canvas-container');
        const loaderStatus = document.getElementById('loading-overlay');

        // Layout Constants
        const GRID_SIZE = 24; // 24x24 sector block matrix
        const SPACING = 3.5;  // Distance unit intervals between coordinates

        init();
        animate();

        function init() {
            // Context & Core Scene Init
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0c);
            scene.fog = new THREE.FogExp2(0x0a0a0c, 0.008);

            // Optics View Configuration
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(45, 35, 65);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Mechanics Control Configuration
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.05; // Prevent breaking past floor

            // Atmosphere Configuration
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const sun = new THREE.DirectionalLight(0xfffaed, 1.2);
            sun.position.set(100, 150, 50);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            sun.shadow.camera.near = 0.5;
            sun.shadow.camera.far = 300;
            const d = 60;
            sun.shadow.camera.left = -d; sun.shadow.camera.right = d;
            sun.shadow.camera.top = d; sun.shadow.camera.bottom = -d;
            scene.add(sun);

            // Infrastructure Surface Planes
            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x151518, roughness: 0.85 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // System Structural Shapes Fallbacks
            generateSystemPlaceholders();

            // Dom Logic Binding Subscriptions
            document.getElementById('glb-uploader').addEventListener('change', parseUploadedGlbs);
            document.getElementById('generate-trigger').addEventListener('click', runProceduralGenerationPipeline);
            window.addEventListener('resize', onWindowResize);

            // Trigger immediate layout run with fallbacks on bootup
            runProceduralGenerationPipeline();
        }

        // Creates default primitives if the user hasn't uploaded .glb models yet
        function generateSystemPlaceholders() {
            const structures = [
                { geo: new THREE.BoxGeometry(2, 6, 2), color: 0x3a4f5c },     // Skyscraper/Tower block
                { geo: new THREE.BoxGeometry(2.2, 2.2, 2.2), color: 0x8c6239 }, // Residential block
                { geo: new THREE.CylinderGeometry(0, 1.5, 3, 4), color: 0x4d6a45 } // Pointed roof block
            ];
            structures.forEach(s => {
                s.geo.translate(0, s.geo.parameters.height ? s.geo.parameters.height / 2 : 1.5, 0);
                const mesh = new THREE.Mesh(s.geo, new THREE.MeshStandardMaterial({ color: s.color, roughness: 0.5 }));
                assetTemplates.push(mesh);
            });
        }

        // Extracts uploaded .glb files and centers their origin pivots
        function parseUploadedGlbs(e) {
            const files = e.target.files;
            if(!files.length) return;

            assetTemplates = []; // Purge default primitive profiles
            const gltfLoader = new THREE.GLTFLoader();
            let parsedCounter = 0;

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.readAsArrayBuffer(file);
                reader.onload = function(event) {
                    gltfLoader.parse(event.target.result, '', (gltf) => {
                        const rootGroup = gltf.scene;
                        const boundBox = new THREE.Box3().setFromObject(rootGroup);
                        const centerOffset = boundBox.getCenter(new THREE.Vector3());
                        
                        // Pivot modification mapping to absolute base bottom edge
                        rootGroup.position.set(-centerOffset.x, -boundBox.min.y, -centerOffset.z);
                        
                        const normalizedAnchor = new THREE.Group();
                        normalizedAnchor.add(rootGroup);
                        
                        assetTemplates.push(normalizedAnchor);
                        parsedCounter++;
                        document.getElementById('asset-count').innerText = `${assetTemplates.length} custom asset shapes loaded. Ready for generation matrix pipeline.`;
                    });
                };
            });
        }

        // Clear previous generation run
        function clearActiveSettlement() {
            const objectsToRemove = [];
            scene.traverse(node => {
                if(node.name === "procedural_building_instance" || node.name === "infrastructure_road") {
                    objectsToRemove.push(node);
                }
            });
            objectsToRemove.forEach(obj => scene.remove(obj));
        }

        // Main Architecture Procedural Pipeline Logic Engine
        function runProceduralGenerationPipeline() {
            if(!assetTemplates.length) return;
            loaderStatus.style.display = "block";
            
            clearActiveSettlement();

            const profile = document.getElementById('biome-selector').value;
            const offsetCorrection = (GRID_SIZE * SPACING) / 2;

            // Loop through the layout grid coordinate system matrix
            for(let x = 0; x < GRID_SIZE; x++) {
                for(let z = 0; z < GRID_SIZE; z++) {
                    
                    // Determine world coordinate placement locations
                    const targetX = x * SPACING - offsetCorrection;
                    const targetZ = z * SPACING - offsetCorrection;

                    // Execute generation math based on selected profile
                    if (profile === "CITY") {
                        // Dense Grid Layout: Reserve space for procedural avenue lines
                        if (x % 4 === 0 || z % 4 === 0) {
                            spawnRoadSegment(targetX, targetZ);
                        } else {
                            // 85% build-up layout fill density
                            if (Math.random() > 0.15) {
                                // City Profile: High density, vertically uniform scaling
                                const variantIndex = Math.floor(Math.random() * assetTemplates.length);
                                const heightScalar = 1.0 + Math.random() * 2.5; // Stretch skyscrapers upward
                                spawnAssetInstance(variantIndex, targetX, targetZ, heightScalar, 1.0, 0);
                            }
                        }
                    } 
                    else if (profile === "VILLAGE") {
                        // Village Profile: Organic noise clusters using simple math rings
                        const distanceToCenter = Math.sqrt(Math.pow(x - GRID_SIZE/2, 2) + Math.pow(z - GRID_SIZE/2, 2));
                        
                        // Cluster structures near the center of the coordinate space
                        if (distanceToCenter < 9) {
                            // Randomized scatter probability drops as we move outward
                            if (Math.random() > (distanceToCenter / 11)) {
                                const variantIndex = Math.floor(Math.random() * assetTemplates.length);
                                const scaleFactor = 0.6 + Math.random() * 0.6; // Smaller, naturally varied scales
                                const randomAngle = Math.random() * Math.PI * 2; // Full organic rotation
                                spawnAssetInstance(variantIndex, targetX, targetZ, scaleFactor, scaleFactor, randomAngle);
                            }
                        }
                    } 
                    else if (profile === "OUTPOST") {
                        // Outpost Profile: Industrial layout built in rigid linear strips
                        if (x % 3 === 0 && z % 2 === 0) {
                            if (Math.random() > 0.2) {
                                const variantIndex = Math.floor(Math.random() * assetTemplates.length);
                                // Snapped alignment rotation step rule (0 or 180 degrees only)
                                const snappedAngle = Math.random() > 0.5 ? 0 : Math.PI;
                                spawnAssetInstance(variantIndex, targetX, targetZ, 1.0, 1.2, snappedAngle);
                            }
                        }
                    }

                }
            }
            
            setTimeout(() => { loaderStatus.style.display = "none"; }, 400);
        }

        // Instantiates and places a selected asset variant into the world
        function spawnAssetInstance(assetIndex, x, z, heightScale, widthScale, rotationY) {
            const sourceTemplate = assetTemplates[assetIndex];
            const instance = sourceTemplate.clone();

            instance.traverse(node => {
                if(node.isMesh) {
                    node.castShadow = true;
                    node.receiveShadow = true;
                }
            });

            // Adjust size based on the environment rules
            instance.scale.set(widthScale, heightScale, widthScale);
            instance.rotation.y = rotationY;
            instance.position.set(x, 0, z);
            instance.name = "procedural_building_instance";

            scene.add(instance);
        }

        // Generates simple dark floor strips for roads in City mode
        function spawnRoadSegment(x, z) {
            const roadGeo = new THREE.PlaneGeometry(SPACING, SPACING);
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x1c1c1f, roughness: 0.95 });
            const segment = new THREE.Mesh(roadGeo, roadMat);
            segment.rotation.x = -Math.PI / 2;
            segment.position.set(x, 0.02, z); // Layer slightly above ground plane to prevent flickering
            segment.receiveShadow = true;
            segment.name = "infrastructure_road";
            scene.add(segment);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
