<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>BNB Chain Token Sender</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>
</head>
<body style="font-family: sans-serif; padding: 20px;">

  <h2>BNB Chain Token Transfer Tester</h2>

  <button onclick="connect()">Connect Wallet</button>
  <p id="status">Not connected</p>

  <hr />

  <input id="token" placeholder="Token address (e.g. BUSD)" style="width: 300px;" /><br /><br />
  <input id="to" placeholder="Recipient address" style="width: 300px;" /><br /><br />
  <input id="amount" placeholder="Amount" /><br /><br />

  <button onclick="send()">Send Token</button>

  <script>
    let provider;
    let signer;

    const BNB_CHAIN = {
      chainId: "0x38",
      chainName: "BNB Smart Chain",
      nativeCurrency: {
        name: "BNB",
        symbol: "BNB",
        decimals: 18
      },
      rpcUrls: ["https://bsc-dataseed.binance.org/"],
      blockExplorerUrls: ["https://bscscan.com"]
    };

    const erc20Abi = [
      "function transfer(address to, uint256 amount) external returns (bool)"
    ];

    async function connect() {
      if (!window.ethereum) {
        alert("No wallet found");
        return;
      }

      // Switch to BNB Chain
      try {
        await window.ethereum.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: BNB_CHAIN.chainId }]
        });
      } catch (err) {
        // Add chain if not exists
        await window.ethereum.request({
          method: "wallet_addEthereumChain",
          params: [BNB_CHAIN]
        });
      }

      provider = new ethers.BrowserProvider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      signer = await provider.getSigner();

      const address = await signer.getAddress();
      document.getElementById("status").innerText = "Connected: " + address;
    }

    async function send() {
      if (!signer) {
        alert("Connect wallet first");
        return;
      }

      const token = document.getElementById("token").value;
      const to = document.getElementById("to").value;
      const amount = document.getElementById("amount").value;

      if (!token || !to || !amount) {
        alert("Fill all fields");
        return;
      }

      try {
        const contract = new ethers.Contract(token, erc20Abi, signer);

        // ⚠️ BUSD uses 18 decimals on BNB Chain
        const tx = await contract.transfer(
          to,
          ethers.parseUnits(amount, 18)
        );

        document.getElementById("status").innerText = "Tx sent: " + tx.hash;

        await tx.wait();

        document.getElementById("status").innerText = "Transfer complete ✅";
      } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "Error: " + err.message;
      }
    }
  </script>

</body>
</html>
