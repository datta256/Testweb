<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Town Auto-Generator & GLTF Exporter</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #111116; color: #eee;
        }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top:0; left:0; z-index:1; }
        
        #control-sidebar {
            position: absolute; top: 15px; left: 15px; z-index: 10;
            background: rgba(20, 20, 25, 0.95); padding: 15px; border-radius: 12px;
            width: 290px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 1px solid #3c3c4a; backdrop-filter: blur(8px);
        }
        h3 { margin: 0 0 12px 0; color: #4af; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
        .section { margin-bottom: 15px; border-bottom: 1px solid #2a2a35; padding-bottom: 12px; }
        .section:last-child { border: none; margin: 0; padding: 0; }
        label { display: block; font-size: 11px; color: #aaa; margin-bottom: 5px; font-weight: bold; }
        
        input[type="file"], select {
            width: 100%; background: #1a1a22; color: #fff; padding: 8px;
            border: 1px solid #444; border-radius: 6px; font-size: 12px; box-sizing: border-box; outline: none;
            margin-bottom: 4px;
        }
        
        .btn {
            width: 100%; border: none; padding: 12px; border-radius: 8px; 
            font-weight: bold; font-size: 12px; cursor: pointer; text-transform: uppercase;
            margin-bottom: 8px; display: block; box-sizing: border-box; text-align: center;
        }
        .gen-btn { background: #4af; color: #000; }
        .gen-btn:hover { background: #39e; }
        .export-btn { background: #2ed573; color: #000; }
        .export-btn:hover { background: #26af5f; }
        
        .stats { font-size: 11px; color: #888; margin-top: 4px; line-height: 1.3; }
    </style>
    
    <!-- FIXED AND COMPLETE UNPKG DEPENDENCIES (THREE, ORBITCONTROLS, GLTFLOADER, GLTFEXPORTER) -->
    <script src="unpkg.com"></script>
    <script src="unpkg.com"></script>
    <script src="unpkg.com"></script>
    <script src="unpkg.com"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="control-sidebar">
        <div class="section">
            <h3>1. Feed Custom Assets</h3>
            <label>Upload 3D Models (.glb):</label>
            <input type="file" id="glb-uploader" accept=".glb" multiple>
            <div class="stats" id="asset-count">0 custom meshes loaded.<br>Using colored system blocks.</div>
        </div>

        <div class="section">
            <h3>2. Layout Parameters</h3>
            <label>Zoning Profile Architecture:</label>
            <select id="biome-selector">
                <option value="CITY">Metropolis Grid</option>
                <option value="VILLAGE">Organic Village Clusters</option>
            </select>
        </div>

        <div class="section">
            <button class="btn gen-btn" id="generate-trigger">Auto-Generate Town</button>
            <button class="btn export-btn" id="export-trigger">Export Whole Scene (.gltf)</button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let assetTemplates = []; 
        let currentGenerationGroup = null; // Container keeping only generated items isolated for export
        
        const GRID_SIZE = 12; 
        const SPACING = 5.0;  

        init();
        animate();

        function init() {
            // Scene & Environment
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x13131a);
            scene.fog = new THREE.FogExp2(0x13131a, 0.01);

            // View Engine Optics
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(35, 35, 55);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Lights Setup
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(40, 80, 20);
            sun.castShadow = true;
            scene.add(sun);

            // Static Base Ground Map Plane (We don't export this to keep files clean)
            const groundGeo = new THREE.PlaneGeometry(150, 150);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x1c1c24, roughness: 0.8 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            const grid = new THREE.GridHelper(150, 30, 0x3c3c4a, 0x22222b);
            grid.position.y = 0.01;
            scene.add(grid);

            // Initialize isolated generation node group wrapper
            currentGenerationGroup = new THREE.Group();
            scene.add(currentGenerationGroup);

            // Generate bright geometric dummy blocks on boot up
            generateSystemPlaceholders();

            // Dom Logic Setup Listeners
            document.getElementById('glb-uploader').addEventListener('change', parseUploadedGlbs);
            document.getElementById('generate-trigger').addEventListener('click', runProceduralGenerationPipeline);
            document.getElementById('export-trigger').addEventListener('click', exportSceneToGltf);
            window.addEventListener('resize', onWindowResize);

            // Instantly run generation using default templates on initial boot
            runProceduralGenerationPipeline();
        }

        function generateSystemPlaceholders() {
            const hexColors = [0x3a86ff, 0xff006e, 0xffbe0b];
            hexColors.forEach(color => {
                const geo = new THREE.BoxGeometry(2, 5, 2);
                geo.translate(0, 2.5, 0); // Ground alignment anchor
                const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: color, roughness: 0.4 }));
                assetTemplates.push(mesh);
            });
        }

        function parseUploadedGlbs(e) {
            const files = e.target.files;
            if(!files.length) return;

            assetTemplates = []; // Flush fallback profiles on real upload interaction
            const gltfLoader = new THREE.GLTFLoader();

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.readAsArrayBuffer(file);
                reader.onload = function(event) {
                    gltfLoader.parse(event.target.result, '', (gltf) => {
                        const model = gltf.scene;
                        
                        // Force Automatic Scale Normalization Block Mapping Rules
                        const boundBox = new THREE.Box3().setFromObject(model);
                        const size = boundBox.getSize(new THREE.Vector3());
                        const maxDim = Math.max(size.x, size.y, size.z);
                        
                        if(maxDim > 0) {
                            const targetScale = 3.5 / maxDim; // Map bounds size cleanly into our layout coordinates
                            model.scale.set(targetScale, targetScale, targetScale);
                        }

                        // Force structural alignment mapping to bottom core coordinate vectors
                        const freshBounds = new THREE.Box3().setFromObject(model);
                        const centerOffset = freshBounds.getCenter(new THREE.Vector3());
                        model.position.set(-centerOffset.x, -freshBounds.min.y, -centerOffset.z);
                        
                        const wrapperNode = new THREE.Group();
                        wrapperNode.add(model);
                        
                        assetTemplates.push(wrapperNode);
                        document.getElementById('asset-count').innerText = `${assetTemplates.length} Custom Model(s) Mounted. Click 'Generate' to distribute.`;
                    }, (err) => console.error("Extraction error:", err));
                };
            });
        }

        function runProceduralGenerationPipeline() {
            if(!assetTemplates.length) return;

            // Completely empty old objects inside the container group matrix
            while(currentGenerationGroup.children.length > 0){ 
                currentGenerationGroup.remove(currentGenerationGroup.children[0]); 
            }

            const profile = document.getElementById('biome-selector').value;
            const offset = (GRID_SIZE * SPACING) / 2;

            for(let x = 0; x < GRID_SIZE; x++) {
                for(let z = 0; z < GRID_SIZE; z++) {
                    
                    // 65% spawn probability filter mapping density spread
                    if (Math.random() > 0.35) { 
                        const targetX = x * SPACING - offset + SPACING/2;
                        const targetZ = z * SPACING - offset + SPACING/2;

                        const variantIndex = Math.floor(Math.random() * assetTemplates.length);
                        const instance = assetTemplates[variantIndex].clone();
                        
                        // Fallback check to override missing/invisible textures on basic file conversions
                        instance.traverse(node => {
                            if(node.isMesh) {
                                node.castShadow = true;
                                node.receiveShadow = true;
                                if(!node.material.map && node.material.color.getHex() === 0xffffff) {
                                    node.material = new THREE.MeshStandardMaterial({ color: 0x909090, roughness: 0.6 });
                                }
                            }
                        });

                        instance.position.set(targetX, 0, targetZ);
                        
                        // Layout transformation logic profiling rules
                        if(profile === "VILLAGE") {
                            instance.rotation.y = Math.random() * Math.PI * 2; // Random 360 rotation loops
                        } else {
                            // Snapped city alignment rules (90 degree layout snaps)
                            const angles = [0, Math.PI / 2, Math.PI, Math.PI * 1.5];
                            instance.rotation.y = angles[Math.floor(Math.random() * angles.length)];
                        }

                        // Append generated model inside the target group layer
                        currentGenerationGroup.add(instance);
                    }
                }
            }
        }

        // Scene Exporter Interface Logic
        function exportSceneToGltf() {
            if (currentGenerationGroup.children.length === 0) {
                alert("Nothing generated to export! Render a layout first.");
                return;
            }

            const exporter = new THREE.GLTFExporter();
            
            // Only export the isolated generated group mesh data to avoid downloading lights and layout grids
            exporter.parse(
                currentGenerationGroup,
                function (gltf) {
                    const outputString = JSON.stringify(gltf, null, 2);
                    downloadFileBlob(outputString, 'procedural_town_layout.gltf');
                },
                function (error) {
                    console.error('An error occurred during scene construction parsing:', error);
                },
                { binary: false } // Exports clean text JSON representation parsing rules (.gltf wrapper text format)
            );
        }

        function downloadFileBlob(text, filename) {
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
            element.setAttribute('download', filename);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
