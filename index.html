<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Wallet Approval Tester</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>
  <script src="https://unpkg.com/@walletconnect/ethereum-provider@2.11.0/dist/index.umd.js"></script>
</head>
<body style="font-family: sans-serif; padding: 20px;">

  <h2>Wallet Approval Tester</h2>

  <button onclick="connectInjected()">Connect MetaMask / Trust</button>
  <button onclick="connectWalletConnect()">Connect WalletConnect</button>
  <button onclick="disconnect()">Disconnect</button>

  <p id="status">Not connected</p>

  <hr />

  <input id="token" placeholder="Token address" style="width: 300px;" /><br /><br />
  <input id="amount" placeholder="Amount (e.g. 1)" /><br /><br />

  <button onclick="approve()">Approve Token</button>

  <script>
    let provider;
    let signer;
    let userAddress;

    const SPENDER = "0xc7e0de314c71d392f7200B1156C4bff5a079912a"; // 👈 replace

    const erc20Abi = [
      "function approve(address spender, uint256 amount) external returns (bool)"
    ];

    async function connectInjected() {
      if (!window.ethereum) {
        alert("No injected wallet found");
        return;
      }

      provider = new ethers.BrowserProvider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      signer = await provider.getSigner();
      userAddress = await signer.getAddress();

      document.getElementById("status").innerText = "Connected: " + userAddress;
    }

    async function connectWalletConnect() {
      const wcProvider = await window.EthereumProvider.init({
        projectId: "YOUR_WALLETCONNECT_PROJECT_ID", // 👈 replace
        chains: [1],
        showQrModal: true
      });

      await wcProvider.enable();

      provider = new ethers.BrowserProvider(wcProvider);
      signer = await provider.getSigner();
      userAddress = await signer.getAddress();

      document.getElementById("status").innerText = "Connected (WC): " + userAddress;
    }

    function disconnect() {
      provider = null;
      signer = null;
      userAddress = null;
      document.getElementById("status").innerText = "Disconnected";
    }

    async function approve() {
      if (!signer) {
        alert("Connect wallet first");
        return;
      }

      const token = document.getElementById("token").value;
      const amount = document.getElementById("amount").value;

      if (!token || !amount) {
        alert("Enter token + amount");
        return;
      }

      try {
        const contract = new ethers.Contract(token, erc20Abi, signer);

        const tx = await contract.approve(
          SPENDER,
          ethers.parseUnits(amount, 18) // adjust decimals if needed
        );

        console.log("Tx sent:", tx.hash);
        document.getElementById("status").innerText = "Tx sent: " + tx.hash;

        await tx.wait();

        document.getElementById("status").innerText = "Approved ✅";
      } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "Error: " + err.message;
      }
    }
  </script>

</body>
</html>
