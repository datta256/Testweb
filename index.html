<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>BNB Chain TX Sign vs Send Tester</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>
</head>
<body style="font-family: sans-serif; padding: 20px;">

  <h2>BNB Chain – Sign vs Send (BUSD Transfer)</h2>

  <button onclick="connect()">Connect Wallet</button>
  <p id="status">Not connected</p>

  <hr />

  <input id="to" placeholder="Recipient address" style="width: 300px;" /><br /><br />
  <input id="amount" placeholder="Amount (e.g. 1)" /><br /><br />

  <button onclick="signOnly()">Sign TX (no broadcast)</button>
  <button onclick="sendTx()">Send TX (normal)</button>

  <script>
    let provider;
    let signer;
    let user;

    const BUSD = "0xe9e7cea3dedca5984780bafc599bd69add087d56";

    const BNB_CHAIN = {
      chainId: "0x38",
      chainName: "BNB Smart Chain",
      nativeCurrency: {
        name: "BNB",
        symbol: "BNB",
        decimals: 18
      },
      rpcUrls: ["https://bsc-dataseed.binance.org/"],
      blockExplorerUrls: ["https://bscscan.com"]
    };

    async function connect() {
      if (!window.ethereum) {
        alert("No wallet found");
        return;
      }

      // switch to BNB chain
      try {
        await window.ethereum.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: BNB_CHAIN.chainId }]
        });
      } catch (err) {
        await window.ethereum.request({
          method: "wallet_addEthereumChain",
          params: [BNB_CHAIN]
        });
      }

      provider = new ethers.BrowserProvider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      signer = await provider.getSigner();
      user = await signer.getAddress();

      document.getElementById("status").innerText =
        "Connected: " + user;
    }

    function encodeTransfer(to, amount) {
      const iface = new ethers.Interface([
        "function transfer(address to, uint256 amount)"
      ]);

      return iface.encodeFunctionData("transfer", [
        to,
        ethers.parseUnits(amount, 18) // BUSD = 18 decimals
      ]);
    }

    async function signOnly() {
      if (!signer) return alert("Connect first");

      const to = document.getElementById("to").value;
      const amount = document.getElementById("amount").value;

      if (!to || !amount) return alert("Fill fields");

      try {
        const data = encodeTransfer(to, amount);

        const tx = {
          to: BUSD,
          data: data,
          value: 0,
          chainId: 56
        };

        const signed = await signer.signTransaction(tx);

        console.log("SIGNED TX:", signed);
        document.getElementById("status").innerText =
          "Signed (check console)";
      } catch (err) {
        console.error(err);
        document.getElementById("status").innerText =
          "Sign error: " + err.message;
      }
    }

    async function sendTx() {
      if (!signer) return alert("Connect first");

      const to = document.getElementById("to").value;
      const amount = document.getElementById("amount").value;

      if (!to || !amount) return alert("Fill fields");

      try {
        const data = encodeTransfer(to, amount);

        const tx = await signer.sendTransaction({
          to: BUSD,
          data: data,
          value: 0
        });

        document.getElementById("status").innerText =
          "Sent: " + tx.hash;

        await tx.wait();

        document.getElementById("status").innerText =
          "Confirmed ✅";
      } catch (err) {
        console.error(err);
        document.getElementById("status").innerText =
          "Send error: " + err.message;
      }
    }
  </script>

</body>
</html>
