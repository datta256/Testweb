<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed Minimal 3D GLB Viewer</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a1e; color: #eee;
            user-select: none; -webkit-user-select: none;
        }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top:0; left:0; z-index:1; }
        
        /* Drag Overlay layer with responsive visibility fixes */
        #drop-zone {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 5; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(26, 26, 30, 0.9); border: 3px dashed #4af; box-sizing: border-box;
            transition: opacity 0.2s ease; pointer-events: none; opacity: 1;
        }
        #drop-zone.hidden { opacity: 0 !important; display: none !important; pointer-events: none !important; }
        #drop-zone p { margin: 10px 0 0 0; font-size: 16px; color: #4af; font-weight: bold; }

        #control-panel {
            position: absolute; top: 15px; left: 15px; z-index: 10;
            background: rgba(30, 30, 35, 0.95); padding: 15px; border-radius: 10px;
            width: 260px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); border: 1px solid #333;
        }
        h3 { margin: 0 0 10px 0; color: #fff; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
        .control-item { margin-bottom: 12px; }
        .control-item:last-child { margin-bottom: 0; }
        label { display: block; font-size: 11px; color: #aaa; margin-bottom: 4px; font-weight: bold; }
        
        input[type="file"], select, button {
            width: 100%; background: #25252b; color: #fff; padding: 8px;
            border: 1px solid #444; border-radius: 6px; font-size: 12px; box-sizing: border-box; outline: none;
        }
        button { background: #4af; color: #000; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; }
        button:hover { background: #39e; }
        
        .toggle-container { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #ccc; }
        .toggle-container input { cursor: pointer; width: auto; }
        
        #model-info { font-size: 11px; color: #888; margin-top: 5px; line-height: 1.4; word-break: break-all; }
    </style>
    
    <!-- Stable Production CDN Dependencies -->
    <script src="unpkg.com"></script>
    <script src="unpkg.com"></script>
    <script src="unpkg.com"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="drop-zone">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        <p>Drag & Drop your .glb file here</p>
    </div>

    <div id="control-panel">
        <h3>Viewer Engine</h3>
        
        <div class="control-item">
            <label>Load Model manually:</label>
            <input type="file" id="file-input" accept=".glb">
            <div id="model-info">No file active</div>
        </div>

        <div class="control-item">
            <label>Lighting Environment:</label>
            <select id="lighting-select">
                <option value="studio">Studio Light (Bright)</option>
                <option value="dramatic">Dramatic High Contrast</option>
                <option value="ambient">Flat Ambient Only</option>
            </select>
        </div>

        <div class="control-item toggle-container">
            <span>Render Wireframe Only</span>
            <input type="checkbox" id="wireframe-toggle">
        </div>

        <button id="reset-cam-btn">Reset View Focus</button>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let currentModel = null;
        let dirLight, hemiLight;

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const modelInfo = document.getElementById('model-info');
        const wireframeToggle = document.getElementById('wireframe-toggle');
        const lightingSelect = document.getElementById('lighting-select');
        const resetCamBtn = document.getElementById('reset-cam-btn');

        init();
        animate();

        function init() {
            // Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1e);

            // Camera Setup
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
            camera.position.set(0, 2, 5);

            // Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Camera Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Lights
            hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
            scene.add(hemiLight);

            dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(5, 10, 7);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // Grid Layout Plane
            const grid = new THREE.GridHelper(20, 20, 0x44444a, 0x2d2d35);
            grid.position.y = -0.01;
            scene.add(grid);

            // Desktop Drag & Drop Listeners
            setupDragAndDrop();

            // Native Input Hooks
            fileInput.addEventListener('change', (e) => {
                if(e.target.files.length > 0) {
                    loadGlbFile(e.target.files[0]);
                }
            });
            
            wireframeToggle.addEventListener('change', toggleWireframeMode);
            lightingSelect.addEventListener('change', alterLightingEnvironment);
            resetCamBtn.addEventListener('click', fitCameraToModel);
            window.addEventListener('resize', onWindowResize);
        }

        // Standardized Extraction Engine Loader
        function loadGlbFile(file) {
            if (!file) return;
            
            // CRITICAL MOBILE FIX: Forcefully break visibility structures instantly
            dropZone.style.display = 'none';
            dropZone.classList.add('hidden');
            
            modelInfo.innerText = `Loading: ${file.name}...`;

            if (currentModel) scene.remove(currentModel);

            const reader = new FileReader();
            reader.readAsArrayBuffer(file);
            reader.onload = function (event) {
                const gltfLoader = new THREE.GLTFLoader();
                gltfLoader.parse(event.target.result, '', (gltf) => {
                    currentModel = gltf.scene;

                    currentModel.traverse(node => {
                        if (node.isMesh) {
                            node.castShadow = true;
                            node.receiveShadow = true;
                            
                            // Material shader fix for unlit missing meshes
                            if(node.material) {
                                node.material.needsUpdate = true;
                            }
                        }
                    });

                    scene.add(currentModel);
                    
                    modelInfo.innerText = `File: ${file.name}\nSize: ${(file.size / (1024 * 1024)).toFixed(2)} MB`;
                    wireframeToggle.checked = false; 
                    fitCameraToModel();
                }, (error) => {
                    modelInfo.innerText = "Error parsing file format.";
                    console.error(error);
                });
            };
        }

        // Camera Framing Adaptation Box Calculator
        function fitCameraToModel() {
            if (!currentModel) return;

            const box = new THREE.Box3().setFromObject(currentModel);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            // Center object coordinates over scene grid origin points
            currentModel.position.x += (currentModel.position.x - center.x);
            currentModel.position.z += (currentModel.position.z - center.z);
            currentModel.position.y += (-box.min.y); // Lock model bottom straight to floor level

            const maxDim = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2)) * 1.6;

            camera.position.set(cameraZ, maxDim * 1.3, cameraZ);
            controls.target.set(0, maxDim / 2, 0);
            camera.lookAt(0, maxDim / 2, 0);
            controls.update();
        }

        function toggleWireframeMode() {
            if (!currentModel) return;
            const wireframeState = wireframeToggle.checked;
            currentModel.traverse(node => {
                if (node.isMesh && node.material) {
                    node.material.wireframe = wireframeState;
                }
            });
        }

        function alterLightingEnvironment() {
            const style = lightingSelect.value;
            if (style === 'studio') {
                hemiLight.intensity = 1.2;
                dirLight.intensity = 1.5;
                dirLight.position.set(5, 10, 7);
            } else if (style === 'dramatic') {
                hemiLight.intensity = 0.2;
                dirLight.intensity = 2.8;
                dirLight.position.set(-3, 6, -3);
            } else if (style === 'ambient') {
                hemiLight.intensity = 2.2;
                dirLight.intensity = 0.0;
            }
        }

        function setupDragAndDrop() {
            // Drop zone helper tracking controls for desktop computers only
            window.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.style.display = 'flex';
                dropZone.classList.remove('hidden');
            });
            window.addEventListener('dragleave', (e) => {
                if (e.clientY <= 0 || e.clientX <= 0 || e.clientX >= window.innerWidth || e.clientY >= window.innerHeight) {
                    if(currentModel) {
                        dropZone.style.display = 'none';
                        dropZone.classList.add('hidden');
                    }
                }
            });
            window.addEventListener('drop', (e) => {
                e.preventDefault();
                if (e.dataTransfer.files.length > 0) {
                    loadGlbFile(e.dataTransfer.files[0]);
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
